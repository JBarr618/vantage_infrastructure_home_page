<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nail Design Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#fff7fb;
    color:#222;
}

header{
    background:white;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.logo span{
    display:block;
    font-size:12px;
    letter-spacing:4px;
    color:#c65f91;
}

nav a{
    text-decoration:none;
    color:#222;
    margin-left:25px;
    font-weight:bold;
}

nav a:hover{
    color:#c65f91;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:60px;
    color:#c65f91;
    margin-bottom:15px;
}

.hero p{
    font-size:22px;
    max-width:800px;
    margin:auto;
}

.gallery{
    padding:50px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.gallery img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    transition:.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}

footer{
    text-align:center;
    padding:25px;
    border-top:1px solid #ddd;
    margin-top:40px;
}

@media(max-width:800px){

.hero h1{
    font-size:42px;
}

.gallery{
    padding:20px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
VANTAGE
<span>NAIL DESIGN</span>
</div>

<nav>
<a href="nails.html">Home</a>
<a href="nail-gallery.html">Gallery</a>
</nav>

</header>

<section class="hero">

<h1>Nail Design Gallery</h1>

<p>
A collection of nail designs, practice work,
creative styles, seasonal themes, and completed projects.
</p>

</section>

<section class="gallery">

<img src="images/nails/nail1.jpg" alt="Nail Design">

<img src="images/nails/nail7.jpg" alt="Nail Design">
<img src="images/nails/nail8.jpg" alt="Nail Design">
<img src="images/nails/nail9.jpg" alt="Nail Design">
<img src="images/nails/nail10.jpg" alt="Nail Design">
<img src="images/nails/nail11.jpg" alt="Nail Design">
<img src="images/nails/nail12.jpg" alt="Nail Design">
<img src="images/nails/nail13.JPG" alt="Nail Design">


</section>

<footer>

</footer>

</body>
</html>
